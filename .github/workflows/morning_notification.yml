name: Morning Notification

on:
  schedule:
    # 5:00 AM IST = 11:30 PM UTC (previous day)
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  send_notification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout content repo
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'

      - name: Install Firebase Admin SDK
        run: npm install firebase-admin

      - name: Send morning notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');
          const fs = require('fs');

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            projectId: process.env.FIREBASE_PROJECT_ID,
          });

          const db = admin.firestore();

          function getTodayDay() {
            const now = new Date();
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istDate = new Date(now.getTime() + istOffset);
            const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
            return days[istDate.getUTCDay()];
          }

          function getDateString() {
            const now = new Date();
            const istOffset = 5.5 * 60 * 60 * 1000;
            const istDate = new Date(now.getTime() + istOffset);
            const day = istDate.getUTCDate().toString().padStart(2, '0');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const month = months[istDate.getUTCMonth()];
            const weekdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const weekday = weekdays[istDate.getUTCDay()];
            return `${day} ${month} | ${weekday}`;
          }

          function getRandomQuote(quotes) {
            return quotes[Math.floor(Math.random() * quotes.length)];
          }

          async function sendMorningNotification() {
            try {
              const workdir = process.env.GITHUB_WORKSPACE || '.';

              const timetable = JSON.parse(fs.readFileSync(`${workdir}/timetable.json`, 'utf8'));
              const quotesData = JSON.parse(fs.readFileSync(`${workdir}/quotes.json`, 'utf8'));
              const override = JSON.parse(fs.readFileSync(`${workdir}/morning_notif.json`, 'utf8'));

              const today = getTodayDay();
              const dateStr = getDateString();
              const dayData = timetable[today];

              console.log(`Today is ${today}`);

              const isHoliday = dayData.holiday || override.holiday;
              const holidayNote = override.holiday_note || '';
              const quote = getRandomQuote(quotesData.quotes);

              const usersSnapshot = await db.collection('users').get();
              const tokens = [];
              usersSnapshot.forEach(doc => {
                const token = doc.data().fcmToken;
                if (token) tokens.push(token);
              });

              console.log(`Sending to ${tokens.length} devices...`);
              if (tokens.length === 0) {
                console.log('No tokens found. Exiting.');
                return;
              }

              let title = '';
              let body = '';

              if (isHoliday) {
                title = '🏖️ Holiday Today!';
                body = holidayNote
                  ? `${holidayNote}\n\n📖 ${quote}`
                  : `No classes today! Enjoy your day.\n\n📖 ${quote}`;
              } else {
                title = `☀️ Good Morning | ${dateStr}`;
                let bodyParts = [];

                if (dayData.morning && dayData.morning.length > 0) {
                  const morningLines = dayData.morning
                    .map(s => `• ${s.subject} – ${s.time}`)
                    .join('\n');
                  bodyParts.push(`🌿 Morning Schedule:\n${morningLines}`);
                }

                if (dayData.afternoon && dayData.afternoon.length > 0) {
                  const afternoonLines = dayData.afternoon
                    .map(s => `• ${s.subject} – ${s.time}`)
                    .join('\n');
                  bodyParts.push(`🌿 Afternoon Schedule:\n${afternoonLines}`);
                }

                if (dayData.must_carry && dayData.must_carry.length > 0) {
                  const carryLines = dayData.must_carry
                    .map(item => `🔵 ${item}`)
                    .join('\n');
                  bodyParts.push(`☁️ Must Carry:\n${carryLines}`);
                }

                bodyParts.push(`📖 Quote of the day:\n${quote}`);
                body = bodyParts.join('\n\n');
              }

              // Single send only — no duplicate calls
              const chunkSize = 500;
              for (let i = 0; i < tokens.length; i += chunkSize) {
                const chunk = tokens.slice(i, i + chunkSize);
                const message = {
                  notification: { title, body },
                  data: {
                    type: 'morning_notification',
                    date: dateStr,
                  },
                  android: {
                    priority: 'high',
                    notification: {
                      sound: 'default',
                    },
                  },
                  tokens: chunk,
                };

                const response = await admin.messaging().sendEachForMulticast(message);
                console.log(`Sent: ${response.successCount} success, ${response.failureCount} failed`);
              }

              console.log('Morning notification complete!');
            } catch (err) {
              console.error('Error:', err);
              process.exit(1);
            }
          }

          sendMorningNotification();
          EOF
