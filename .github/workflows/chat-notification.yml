name: Chat Notification

on:
  workflow_dispatch:
    inputs:
      chat_id:
        description: 'Chat document ID'
        required: true
      sender_id:
        description: 'Sender UID'
        required: true
      sender_name:
        description: 'Sender display name'
        required: true
      recipient_id:
        description: 'Recipient UID'
        required: true
      message_text:
        description: 'Message preview'
        required: true

jobs:
  send_chat_notification:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'

      - name: Install Firebase Admin SDK
        run: npm install firebase-admin

      - name: Send chat notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          SENDER_ID: ${{ github.event.inputs.sender_id }}
          SENDER_NAME: ${{ github.event.inputs.sender_name }}
          RECIPIENT_ID: ${{ github.event.inputs.recipient_id }}
          MESSAGE_TEXT: ${{ github.event.inputs.message_text }}
        run: |
          node << 'EOF_NODE'
          const admin = require('firebase-admin');

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            projectId: process.env.FIREBASE_PROJECT_ID,
          });

          const db = admin.firestore();

          async function sendChatNotification() {
            try {
              const recipientId = process.env.RECIPIENT_ID;
              const senderId = process.env.SENDER_ID;
              const senderName = process.env.SENDER_NAME || 'New message';
              const messageText = process.env.MESSAGE_TEXT || '';
              const chatId = process.env.CHAT_ID;

              const userDoc = await db.collection('users').doc(recipientId).get();
              if (!userDoc.exists) {
                console.log('Recipient user document not found. Skipping send.');
                return;
              }

              const token = userDoc.data()?.fcmToken;
              if (!token) {
                console.log('Recipient has no FCM token. Skipping send.');
                return;
              }

              await admin.messaging().send({
                token,
                notification: {
                  title: senderName,
                  body: messageText,
                },
                data: {
                  type: 'chat',
                  chatId,
                  senderId,
                  senderName,
                  body: messageText,
                },
                android: {
                  priority: 'high',
                  notification: {
                    channelId: 'utopia_high_importance',
                    icon: 'ic_notification',
                  },
                },
              });

              console.log('Chat notification sent successfully.');
            } catch (err) {
              console.error('Error:', err);
              process.exit(1);
            }
          }

          sendChatNotification();
          EOF_NODE
