 name: Chat Notification

  on:
    workflow_dispatch:
      inputs:
        chat_id:
          description: Chat document ID
          required: true
          type: string
        sender_id:
          description: Sender UID
          required: true
          type: string
        sender_name:
          description: Sender display name
          required: true
          type: string
        recipient_id:
          description: Recipient UID
          required: true
          type: string
        message_text:
          description: Message preview
          required: true
          type: string

  jobs:
    send:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install Google Auth Library
          run: npm install google-auth-library

        - name: Send chat notification
          env:
            FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            PROJECT_ID: utopia-app-33cf8
            CHAT_ID: ${{ inputs.chat_id }}
            SENDER_ID: ${{ inputs.sender_id }}
            SENDER_NAME: ${{ inputs.sender_name }}
            RECIPIENT_ID: ${{ inputs.recipient_id }}
            MESSAGE_TEXT: ${{ inputs.message_text }}
          run: |
            node <<'EOF'
            const { GoogleAuth } = require('google-auth-library');

            async function run() {
              const credentialsJson = process.env.FIREBASE_SERVICE_ACCOUNT_JSON;
              if (!credentialsJson) {
                throw new Error('Missing FIREBASE_SERVICE_ACCOUNT_JSON secret.');
              }

              const projectId = process.env.PROJECT_ID;
              const recipientId = process.env.RECIPIENT_ID;
              const senderId = process.env.SENDER_ID;
              const senderName = process.env.SENDER_NAME || 'New message';
              const messageText = process.env.MESSAGE_TEXT || '';
              const chatId = process.env.CHAT_ID;

              const credentials = JSON.parse(credentialsJson);
              const auth = new GoogleAuth({
                credentials,
                scopes: ['https://www.googleapis.com/auth/firebase.messaging'],
              });

              const client = await auth.getClient();
              const accessTokenResponse = await client.getAccessToken();
              const accessToken =
                typeof accessTokenResponse === 'string'
                  ? accessTokenResponse
                  : accessTokenResponse?.token;

              if (!accessToken) {
                throw new Error('Could not obtain Google access token.');
              }

              const userResponse = await fetch(
                `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/users/${recipientId}`,
                {
                  headers: {
                    Authorization: `Bearer ${accessToken}`,
                  },
                }
              );

              if (!userResponse.ok) {
                throw new Error(`Failed to load recipient user: ${userResponse.status}`);
              }

              const userDoc = await userResponse.json();
              const token = userDoc.fields?.fcmToken?.stringValue;
              if (!token) {
                console.log('Recipient has no FCM token. Skipping send.');
                return;
              }

              const notificationResponse = await fetch(
                `https://fcm.googleapis.com/v1/projects/${projectId}/messages:send`,
                {
                  method: 'POST',
                  headers: {
                    Authorization: `Bearer ${accessToken}`,
                    'Content-Type': 'application/json',
                  },
                  body: JSON.stringify({
                    message: {
                      token,
                      notification: {
                        title: senderName,
                        body: messageText,
                      },
                      data: {
                        type: 'chat',
                        chatId,
                        senderId,
                        senderName,
                        body: messageText,
                      },
                      android: {
                        priority: 'HIGH',
                        notification: {
                          channel_id: 'utopia_high_importance',
                          icon: 'ic_notification',
                        },
                      },
                    },
                  }),
                }
              );

              if (!notificationResponse.ok) {
                const errorText = await notificationResponse.text();
                throw new Error(`FCM send failed: ${notificationResponse.status} ${errorText}`);
              }

              console.log('Chat notification sent successfully.');
            }

            run().catch((error) => {
              console.error(error);
              process.exit(1);
            });
            EOF
